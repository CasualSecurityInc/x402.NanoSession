app = "x402-demo-server-mainnet"
primary_region = "fra"

[deploy]
strategy = "immediate"

[build]
dockerfile = "Dockerfile"

[build.args]
PNPM_VERSION = "10.30.3"

[env]
VITE_TEST_AND_DEMO_SERVER_URL = "http://0.0.0.0:3001"
# Cap V8 heap so Node OOM-crashes instead of swap-thrashing (fail-fast)
NODE_OPTIONS = "--max-old-space-size=350"
# DOTENV_CONFIG_PATH is omitted so the Express logic falls back to using the injected Fly secrets
NANO_TAG_MULTIPLIER = "1000000000000000000000000"
NANO_TAG_MODULUS = "10000"

[http_service]
internal_port = 3001
force_https = true
auto_stop_machines = false
auto_start_machines = true
min_machines_running = 1
processes = ["app"]

[[http_service.checks]]
grace_period = "30s"
interval = "5s"
timeout = "2s"
method = "GET"
path = "/health"
